name: Update Global Lottery 10-Year Database

on:
  workflow_dispatch: 
  schedule:
    - cron: "15,45 2 * * *" # 早上同步
    - cron: "15,45 14 * * *" # 晚上同步

permissions:
  contents: write

jobs:
  update-lottery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run 10-Year Crawlers
        run: |
          node fetch_latest_539.js || true
          node fetch_lotto.js || true
          node fetch_weili.js || true
          node fetch_marksix.js || true
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add *.json
          git diff --cached --quiet || (git commit -m "🤖 V14 終極數據同步" && git push)
