name: Update Lottery 10-Year Database

on:
  workflow_dispatch: 
  schedule:
    # 狙擊模式：精準鎖定台灣時間每天晚上 22:15, 22:30, 22:45 執行
    - cron: "15,30,45 14 * * *" 

permissions:
  contents: write

jobs:
  update-lottery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run 10-Year Crawlers
        run: |
          node fetch_latest_539.js || true
          node fetch_lotto.js || true
          node fetch_weili.js || true
          node fetch_marksix.js || true
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add *.json
          git diff --cached --quiet || (git commit -m "🤖 V13.5 終極同步" && git push)
