name: Update Global Lottery 10-Year Database

on:
  workflow_dispatch: 
  schedule:
    # 早上狙擊：台灣時間 10:15, 10:45 (同步加州天天樂)
    - cron: "15,45 2 * * *" 
    # 晚上狙擊：台灣時間 22:15, 22:45 (同步台彩系列)
    - cron: "15,45 14 * * *" 

permissions:
  contents: write

jobs:
  update-lottery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run 10-Year Crawlers
        run: |
          node fetch_latest_539.js || true
          node fetch_lotto.js || true
          node fetch_weili.js || true
          node fetch_marksix.js || true
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add *.json
          git diff --cached --quiet || (git commit -m "🤖 V13.5 終極同步" && git push)
