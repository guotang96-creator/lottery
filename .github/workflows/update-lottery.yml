name: Update Global Lottery Database

on:
  workflow_dispatch: 
  schedule:
    - cron: "15,45 2 * * *" 
    - cron: "15,45 14 * * *" 

permissions:
  contents: write

jobs:
  update-lottery:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4
      - name: ⚙️ 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 🕷️ 啟動全彩種繞道爬蟲
        run: |
          node fetch_latest_539.js || true
          node fetch_lotto.js || true
          node fetch_weili.js || true
          node fetch_marksix.js || true
          node fetch_daily.js || true
      - name: 💾 儲存並更新資料庫
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add *.json
          git diff --cached --quiet || (git commit -m "🤖 V14 代理突破版數據同步" && git push)
