name: Update 539 Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: update-539-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Show current time
        run: |
          date
          node -v

      - name: Run update script
        run: node update_539.js

      - name: Show latest.json
        run: |
          echo "===== latest.json ====="
          cat latest.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add latest.json

          if git diff --cached --quiet; then
            echo "沒有資料變更，不需 commit"
          else
            git commit -m "auto update latest 539 data"
            git push
          fi