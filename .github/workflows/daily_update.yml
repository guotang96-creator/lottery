name: Daily 39 Crawler

on:
  schedule:
    # 每天台灣時間早上 10:30 執行一次 (UTC 02:30)
    - cron: '30 2 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予寫入權限，確保能 Push 檔案
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run crawler
        run: python daily_crawler.py

      - name: Commit and Push files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 檢查檔案是否存在且有內容
          if [ -f daily.json ]; then
            git add daily.json
            # 如果沒有檔案變動，commit 會失敗，用 || exit 0 忽略它
            git commit -m "Auto Update Daily 39 Data" || exit 0
            git push
          else
            echo "Error: daily.json was not generated by the crawler."
            exit 1
          fi
