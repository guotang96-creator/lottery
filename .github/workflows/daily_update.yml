name: Daily 39 Crawler

on:
  schedule:
    # 每天台灣時間早上 10:30 執行 (UTC 02:30)
    - cron: '30 2 * * *'
  workflow_dispatch: # 允許我們在手機上點擊 "Run workflow" 手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 💡 關鍵權限設定：允許 Action 把檔案寫回您的倉庫
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run crawler
        run: python daily_crawler.py

      - name: Commit and Push files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 檢查 daily.json 是否真的有被產出
          if [ -f daily.json ]; then
            git add daily.json
            # 如果內容沒變，commit 會報錯，所以加上 || exit 0
            git commit -m "🤖 自動更新天天樂歷史數據" || exit 0
            git push
          else
            echo "❌ 錯誤：爬蟲未能產出 daily.json 檔案"
            exit 1
          fi
