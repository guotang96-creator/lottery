<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彩券 AI 數據分析中心</title>
    <link rel="stylesheet" href="style.css?v=1118">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-icon">AI</div>
        <h1>彩券 AI 數據分析中心</h1>
        <div class="subtitle">V13 全能對獎旗艦版</div>
    </header>

    <main id="page-home" class="page active">
        <section class="card draw-result-card">
            <div class="card-header">
                <h2>🏆 開獎結果 <span id="current-game-title" class="highlight-text">請選擇彩種</span></h2>
                <div class="status-text" id="sync-status">等待連線中...</div>
            </div>
            <div class="balls-container" id="latest-balls">
                <div class="loading-text">請在下方選擇彩種</div>
            </div>
            
            <div id="ai-verify-box" class="ai-verify-box" style="display:none;">
                <div class="verify-header">
                    <span>🎯 上期 AI 預測對獎</span>
                    <span id="verify-hit-count" class="hit-count">命中 0 顆</span>
                </div>
                <div class="balls-container" id="verify-balls" style="margin: 10px 0 0 0; gap: 6px;"></div>
            </div>

            <button class="action-btn" style="margin-top:15px;" onclick="fetchPrediction(currentGame)">
                <i class="fas fa-sync-alt"></i> 從雲端抓取最新資料
            </button>
        </section>

        <section class="card ai-prediction-card">
            <div class="card-header"><h2>🤖 智能選號建議 (V12 量化矩陣)</h2></div>
            <div class="game-selector">
                <button class="game-btn" onclick="setGame('539')">今彩 539</button>
                <button class="game-btn" onclick="setGame('daily')">天天樂</button>
                <button class="game-btn" onclick="setGame('lotto')">大樂透</button>
                <button class="game-btn" onclick="setGame('weili')">威力彩</button>
                <button class="game-btn" onclick="setGame('marksix')">六合彩</button>
            </div>
            <div class="prediction-content" id="prediction-content">
                <div class="error-text">請先選擇上方彩種</div>
            </div>
            <button id="save-fav-btn" class="action-btn" style="display:none; margin-top:15px; border-color:#ff9800; color:#ff9800;" onclick="saveFavorite()">
                <i class="fas fa-star"></i> 將這組預測加入收藏
            </button>
        </section>
    </main>

    <main id="page-history" class="page">
        <section class="card">
            <div class="card-header">
                <h2>📜 歷史開獎查詢 <span id="history-game-title" class="highlight-text"></span></h2>
            </div>
            <div class="history-list-container" id="history-list-container">
                <div class="loading-text">請先在首頁選擇彩種</div>
            </div>
        </section>
    </main>

    <main id="page-backtest" class="page">
        <section class="card">
            <div class="card-header">
                <h2>📈 數據統計分析 <span id="backtest-title" class="highlight-text"></span></h2>
            </div>
            <div id="backtest-content">
                <button class="action-btn" onclick="runAnalysis()"><i class="fas fa-chart-pie"></i> 執行近 50 期冷熱門分析</button>
                <div id="analysis-result" style="margin-top: 15px;">
                    <div class="loading-text" style="font-size:0.8rem;">請先在首頁選擇彩種</div>
                </div>
            </div>
        </section>
    </main>

    <main id="page-favorite" class="page">
        <section class="card">
            <div class="card-header"><h2>⭐ 我的收藏號碼</h2></div>
            <div id="favorite-list">
                <div class="loading-text">尚無收藏紀錄</div>
            </div>
        </section>
    </main>

    <main id="page-setting" class="page">
        <section class="card">
            <div class="card-header"><h2>⚙️ 系統設定</h2></div>
            <div class="setting-item">
                <span><i class="fas fa-trash-alt" style="color:var(--text-muted); margin-right:8px;"></i> 清除系統快取與收藏</span>
                <button class="game-btn" onclick="clearCache()" style="color:#ff4d4f; border-color:#ff4d4f;">執行清除</button>
            </div>
            <div class="setting-item" style="border-bottom:none;">
                <span><i class="fas fa-info-circle" style="color:var(--text-muted); margin-right:8px;"></i> 核心引擎版本</span>
                <span style="color:var(--text-muted); font-size:0.85rem;">V13 自動對獎引擎</span>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" id="nav-home" onclick="switchPage('home')">首頁</button>
        <button class="nav-item" id="nav-history" onclick="switchPage('history')">歷史</button>
        <button class="nav-item" id="nav-backtest" onclick="switchPage('backtest')">回測</button>
        <button class="nav-item" id="nav-favorite" onclick="switchPage('favorite')">收藏</button>
        <button class="nav-item" id="nav-setting" onclick="switchPage('setting')">設定</button>
    </nav>

    <script src="app2.js?v=1118"></script>
</body>
</html>
