<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彩券 AI 數據分析中心 V5.3</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at top left, #1e1b4b, var(--bg-dark));
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        #app-container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Header */
        header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .app-icon {
            width: 50px; height: 50px; border-radius: 14px;
            background: linear-gradient(135deg, #60a5fa, #2563eb);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        h1 { font-size: 18px; letter-spacing: 1px; }
        .version-badge {
            font-size: 11px; background: rgba(255,255,255,0.1); padding: 4px 10px;
            border-radius: 20px; color: var(--text-sub); margin-top: 5px; display: inline-block;
        }

        /* Glass Card */
        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); border-radius: 20px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-header h2 { font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .date-badge { background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 8px; font-size: 12px; }
        .desc-text { font-size: 13px; color: var(--text-sub); line-height: 1.5; }

        /* Balls */
        .balls-display { display: flex; gap: 10px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        .ball {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 18px; font-weight: bold;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            box-shadow: inset 2px 2px 5px rgba(255,255,255,0.1), 3px 3px 10px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .ai-ball { background: linear-gradient(145deg, #3b82f6, #1d4ed8); text-shadow: 0 2px 4px rgba(0,0,0,0.3); }

        /* Buttons & Selectors */
        .type-selector { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 12px; }
        .type-btn {
            flex: 1; padding: 12px 0; border: 1px solid var(--card-border); border-radius: 10px;
            background: transparent; color: var(--text-sub); font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .action-btn {
            width: 100%; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer;
            border: none; display: flex; justify-content: center; align-items: center; gap: 10px; transition: 0.2s;
        }
        .primary-btn { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .primary-btn:active { transform: scale(0.98); }
        .secondary-btn { background: rgba(255,255,255,0.1); color: white; }

        /* Lists */
        .list-item {
            background: rgba(0,0,0,0.2); border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .list-header { font-size: 12px; color: var(--text-sub); margin-bottom: 8px; display: flex; justify-content: space-between; width: 100%; }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid var(--card-border);
            display: flex; justify-content: space-around; padding: 10px 0 calc(10px + env(safe-area-inset-bottom)); z-index: 100;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            color: #64748b; font-size: 11px; padding: 5px 15px; cursor: pointer; transition: 0.3s;
        }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 20px; }

        /* Utils */
        .hidden { display: none !important; }
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 999;
            background: #10b981; color: white; padding: 10px 20px; border-radius: 30px; font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="toast" class="hidden">操作成功</div>

        <header>
            <div class="app-icon">AI</div>
            <div>
                <h1>彩券 AI 數據分析中心</h1>
                <div class="version-badge">V5.3 全能旗艦版</div>
            </div>
        </header>

        <section id="page-home" class="page">
            <div class="glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-trophy"></i> 最新開獎結果 (<span id="home-type-label">今彩 539</span>)</h2>
                    <div class="date-badge" id="draw-date">載入中</div>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sub);">
                    <span>期數：<span id="draw-period">---</span></span>
                    <span>最後更新：<span id="update-time">---</span></span>
                </div>
                <div class="balls-display" id="latest-balls">
                    <div class="ball"><i class="fas fa-spinner fa-spin" style="font-size:16px;"></i></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-magic"></i> 智能選號建議</h2>
                </div>
                
                <div class="type-selector">
                    <button class="type-btn" id="tab-539" style="background: rgba(59,130,246,0.2); border-color: #3b82f6; color: white;">今彩 539</button>
                    <button class="type-btn" id="tab-daily">加州天天樂</button>
                </div>

                <p class="desc-text" id="ai-desc" style="margin-bottom: 20px;">目前針對 [今彩 539] 執行深度學習趨勢分析。</p>
                
                <div id="ai-output-area" style="margin-bottom: 20px;">
                    <div style="border: 1px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 30px 10px; text-align: center;">
                        <i class="fas fa-brain" style="font-size: 30px; color: #475569; margin-bottom: 10px;"></i>
                        <p class="desc-text" id="ai-placeholder-text">539 分析引擎就緒，準備產生推薦號碼</p>
                    </div>
                </div>

                <button id="btn-run-ai" class="action-btn primary-btn">
                    <i class="fas fa-play"></i> 開始智能分析
                </button>
            </div>
        </section>

        <section id="page-history" class="page hidden">
            <div class="glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-history"></i> 歷史紀錄</h2>
                    <button id="btn-reload" style="background:none; border:none; color:var(--primary); font-size:16px;"><i class="fas fa-sync"></i></button>
                </div>
                <div id="history-list" style="margin-top: 15px;"></div>
            </div>
        </section>

        <section id="page-backtest" class="page hidden">
            <div class="glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-chart-line"></i> 勝率回測 (<span id="bt-type-label">今彩 539</span>)</h2>
                </div>
                <p class="desc-text" style="margin-bottom: 15px;">使用本地演算法對過去 5 期進行模擬預測，驗證 AI 抓牌準確度。</p>
                
                <button id="btn-run-bt" class="action-btn primary-btn">
                    <i class="fas fa-redo"></i> 重新執行回測
                </button>
                
                <div id="bt-stats-panel" style="margin-top: 20px;"></div>
                <div id="bt-list" style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;"></div>
            </div>
        </section>

        <section id="page-favorites" class="page hidden">
            <div class="glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-star"></i> 我的收藏</h2>
                    <button id="btn-clear-fav" style="background:none; border:none; color:#ef4444; font-size:14px;"><i class="fas fa-trash"></i> 清空</button>
                </div>
                <p class="desc-text" style="margin-bottom: 15px;">您儲存的 AI 預測紀錄：</p>
                <div id="favorites-list"></div>
            </div>
        </section>

        <section id="page-tools" class="page hidden">
            <div class="glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-search-chart"></i> 歷史拖牌與版路統計</h2>
                </div>
                <p class="desc-text" style="margin-bottom: 15px;">利用現有數據庫，分析特定號碼開出後，下一期最常跟著出現的「拖牌號碼」。</p>
                
                <div style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 15px;">
                    <label style="font-size: 13px; color: var(--text-sub); display: block; margin-bottom: 8px;">選擇目標號碼：</label>
                    <select id="tool-target-num" style="width: 100%; padding: 12px; border-radius: 8px; background: rgba(15,23,42,0.8); color: white; border: 1px solid var(--primary); font-size: 16px; outline: none;">
                        </select>
                </div>

                <button id="btn-run-tool" class="action-btn primary-btn">
                    <i class="fas fa-calculator"></i> 開始分析版路
                </button>
                
                <div id="tool-result-area" style="margin-top: 20px;"></div>
            </div>
        </section>

    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" data-target="page-home">
            <i class="fas fa-home"></i><span>首頁</span>
        </div>
        <div class="nav-item" data-target="page-history">
            <i class="fas fa-history"></i><span>歷史</span>
        </div>
        <div class="nav-item" data-target="page-backtest">
            <i class="fas fa-chart-line"></i><span>回測</span>
        </div>
        <div class="nav-item" data-target="page-favorites">
            <i class="fas fa-star"></i><span>收藏</span>
        </div>
        <div class="nav-item" data-target="page-tools">
            <i class="fas fa-tools"></i><span>工具</span>
        </div>
    </nav>

    <script>
    document.write('<script src="app2.js?v=' + new Date().getTime() + '"><\/script>');
</script>
</body>
</html>
