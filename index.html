<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彩券 AI 數據分析中心 V5.3</title>
    <link rel="stylesheet" href="style.css?v=102">
</head>
<body>
    <header>
        <div class="logo">AI</div>
        <h1>彩券 AI 數據分析中心</h1>
        <div class="subtitle">V5.3 全能旗艦版 (高頻升級)</div>
    </header>

    <main id="page-home" class="page active">
        
        <section class="card" id="latest-result-card">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #2a2d52; padding-bottom: 10px; margin-bottom: 15px;">
                <h2 style="margin: 0; border: none; padding: 0;">🏆 開獎結果 <span id="latest-title-type" style="color: #2f65ff; font-size: 14px; margin-left: 5px;">今彩 539</span></h2>
                <div style="text-align: right; font-size: 12px; color: #8a8db9;">
                    期數: <span id="latest-issue">載入中...</span><br>
                    <span id="latest-date"></span>
                </div>
            </div>
            <div class="ball-container" id="latest-balls" style="margin-top: 10px;">
                <div style="color: #888; font-size: 14px; text-align: center;">資料同步中...</div>
            </div>
        </section>

        <section class="card">
            <h2>🤖 智能選號建議</h2>
            
            <div class="tab-buttons">
                <button class="primary-btn active" id="btn-539" onclick="switchTab('539')">今彩 539</button>
                <button class="secondary-btn" id="btn-ttl" onclick="switchTab('ttl')">加州天天樂</button>
                <button class="secondary-btn" id="btn-bingo" onclick="switchTab('bingo')" style="border-color: #ff3b30; color: #ff3b30;">台灣賓果 (高頻)</button>
            </div>

            <div id="hft-timer-container" class="hidden">
                <span class="pulse-dot"></span>
                <span class="hft-text">V10 矩陣高頻收斂中，下次更新：</span>
                <span id="hft-timer" class="hft-clock">00:00</span>
            </div>

            <div class="predict-result" id="result-box">
                <div style="text-align: center; color: #888; padding: 20px;">資料載入中...</div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active">首頁</button>
        <button class="nav-item">歷史</button>
        <button class="nav-item">回測</button>
        <button class="nav-item">收藏</button>
        <button class="nav-item">工具</button>
    </nav>

    <script src="app2.js?v=108"></script>
</body>
</html>
