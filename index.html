<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>539 AI 預測中心 V4.0</title>
  <link rel="stylesheet" href="style.css?v=4.0.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-box">539</div>
      <div class="title-box">
        <h1>Gemini AI 預測中心</h1>
        <span class="version-tag">V4.0 全新架構</span>
      </div>
    </header>

    <main class="app-main">
      
      <div class="glass-card">
        <div class="card-header">
          <h2><i class="fas fa-trophy"></i> 最新開獎</h2>
          <span id="draw-date" class="badge">--</span>
        </div>
        <div class="draw-info">期數：<span id="draw-period">--</span></div>
        <div class="balls-display" id="latest-balls">
          </div>
      </div>

      <div class="glass-card ai-card">
        <div class="card-header">
          <h2 style="color: #60a5fa;"><i class="fas fa-brain"></i> Gemini 深度預測</h2>
        </div>
        <p class="desc-text">點擊下方按鈕，呼叫雲端隨機森林模型進行下期大數據權重運算。</p>
        
        <div id="ai-output-area" class="ai-output hidden">
          </div>

        <button id="btn-run-ai" class="action-btn primary-btn">
          <i class="fas fa-bolt"></i> 啟動 AI 運算
        </button>
      </div>

    </main>

    <nav class="bottom-nav">
      <button class="nav-item active"><i class="fas fa-home"></i>首頁</button>
      <button class="nav-item"><i class="fas fa-history"></i>歷史</button>
      <button class="nav-item"><i class="fas fa-star"></i>收藏</button>
      <button class="nav-item"><i class="fas fa-cog"></i>設定</button>
    </nav>
  </div>

  <script src="app.js?v=4.0.0"></script>
</body>
</html>
