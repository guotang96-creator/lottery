<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>今彩539 AI 預測系統</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="stylesheet" href="style.css?v=final-stable" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="app-shell">
    
    <section id="page-home" class="page">
      <div class="hero-card">
        <div class="hero-icon">539</div>
        <div class="hero-info">
          <h1>今彩539 AI 預測系統</h1>
          <div class="hero-subline">
            <span id="appVersionText">V3.8.5</span>｜<span>資料正常</span><span class="status-dot"></span>
          </div>
          <div class="hero-update">最後更新：<span id="lastUpdateText">-</span></div>
        </div>
      </div>

      <section class="card">
        <div class="section-title">最新開獎</div>
        <div class="info-grid">
          <div>最新期數：<strong id="latestPeriod">-</strong></div>
          <div>開獎日期：<strong id="latestDate">-</strong></div>
          <div>資料來源：<strong id="dataSourceText">-</strong></div>
          <div>目前模式：<strong id="currentModeText">均衡型</strong></div>
        </div>
        <div class="balls-row" id="latestBalls"></div>
      </section>

      <section class="card">
        <div class="section-title">主推薦號碼</div>
        <div class="balls-row" id="recommendBalls1"></div>
        <div class="recommend-meta"></div>
        <div class="action-row">
          <button id="btnPredictHome" class="primary-btn">立即預測</button>
          <button id="btnCopy" class="secondary-btn">複製號碼</button>
          <button id="btnSave" class="secondary-btn">收藏號碼</button>
        </div>
      </section>

      <section class="card" style="background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid #3b82f6;">
        <div class="section-title" style="color: #60a5fa;"><i class="fas fa-brain"></i> Gemini 強力深度分析</div>
        <button id="btn-gemini" class="primary-btn" style="width: 100%; background: linear-gradient(135deg, #2563eb, #1e40af);">執行 Gemini 分析</button>
        <div id="ai-result-box" style="margin-top: 15px; display: none;"></div>
      </section>

      <section class="card">
        <div class="section-title">快速分析</div>
        <div class="analysis-grid">
          <div class="analysis-item"><span class="label">熱門號</span><strong id="hotNums">-</strong></div>
          <div class="analysis-item"><span class="label">冷門號</span><strong id="coldNums">-</strong></div>
          <div class="analysis-item"><span class="label">拖號組</span><strong id="dragNums">-</strong></div>
          <div class="analysis-item"><span class="label">強勢尾數</span><strong id="tailNums">-</strong></div>
        </div>
      </section>
    </section>

    <section id="page-predict" class="page hidden">
      <section class="card">
        <div class="section-title">預測設定</div>
        <label class="field-label" for="analysisPeriods">分析期數</label>
        <select id="analysisPeriods" class="form-control"><option value="120" selected>120期</option></select>
        <label class="field-label" for="predictMode">預測模式</label>
        <select id="predictMode" class="form-control"><option value="balanced">均衡型</option></select>
        <button id="btnPredictPage" class="primary-btn" style="width:100%; margin-top:15px;">立即預測</button>
      </section>
      <section class="card"><div id="predictResultsList"></div></section>
    </section>

    <section id="page-history" class="page hidden">
      <section class="card"><div class="section-title">最近 5 期</div><div id="recent5List"></div></section>
    </section>

    <section id="page-favorites" class="page hidden">
      <section class="card"><div class="section-title">收藏清單</div><div id="favoritesList"></div></section>
    </section>

    <section id="page-backtest" class="page hidden">
      <section class="card">
        <div class="section-title">回測命中率</div>
        <button id="btnRunBacktest" class="primary-btn" style="width:100%;">開始回測</button>
        <div id="backtestResultsList" style="margin-top:15px;"></div>
      </section>
    </section>

    <section id="page-settings" class="page hidden">
      <section class="card">
        <div class="section-title">系統設定</div>
        <button id="btnReloadData" class="secondary-btn" style="width:100%;">重新載入資料</button>
      </section>
    </section>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="home"><i class="fas fa-home"></i><br>首頁</button>
    <button class="nav-btn" data-page="predict"><i class="fas fa-magic"></i><br>預測</button>
    <button class="nav-btn" data-page="history"><i class="fas fa-history"></i><br>歷史</button>
    <button class="nav-btn" data-page="favorites"><i class="fas fa-star"></i><br>收藏</button>
    <button class="nav-btn" data-page="backtest"><i class="fas fa-chart-line"></i><br>回測</button>
    <button class="nav-btn" data-page="settings"><i class="fas fa-cog"></i><br>設定</button>
  </nav>

  <div id="appDialog" class="app-dialog hidden">
    <div class="app-dialog-backdrop" data-dialog-close="1"></div>
    <div class="app-dialog-box">
      <div id="appDialogTitle" class="app-dialog-title">系統訊息</div>
      <div id="appDialogMessage" class="app-dialog-message">-</div>
      <div class="app-dialog-actions"><button id="appDialogConfirm" class="primary-btn">確定</button></div>
    </div>
  </div>
  <script src="app.js?v=final-stable"></script>
</body>
</html>
