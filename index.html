<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今彩539 & 天天樂 AI 分析中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=5.2">
</head>
<body>

    <header class="app-header">
        <div class="logo-box">AI</div>
        <div class="header-titles">
            <h1>彩券 AI 數據分析中心</h1>
            <span class="version-badge">V5.2 雙核心版</span>
        </div>
    </header>

    <main class="app-main">
        <section id="page-home" class="page active">
            
            <div class="glass-card">
                <div class="card-header">
                    <h2><i class="fas fa-trophy"></i> 最新開獎結果 (539)</h2>
                    <span id="draw-date" class="badge">資料載入中</span>
                </div>
                <div class="info-row" style="display: flex; justify-content: space-between; font-size: 11px; color: #64748b; margin-bottom: 12px; padding: 0 5px;">
                    <span>期數：<span id="draw-period" style="color:#94a3b8;">---</span></span>
                    <span>最後更新：<span id="update-time" style="color:#94a3b8;">--:--</span></span>
                </div>
                <div id="latest-balls" class="balls-display">
                    <div style="font-size: 12px; color: #475569;"><i class="fas fa-sync fa-spin"></i> 正在連線官方資料庫...</div>
                </div>
            </div>

            <div class="glass-card ai-card">
                <div class="card-header">
                    <h2><i class="fas fa-magic"></i> 智能選號建議</h2>
                </div>
                
                <div class="type-selector" style="display: flex; gap: 8px; margin: 15px 0;">
                    <button id="tab-539" class="type-btn active-tab" style="flex:1; padding: 10px; border-radius: 12px; border: 1px solid #3b82f6; background: rgba(59,130,246,0.2); color: white; font-size: 13px; cursor: pointer; transition: 0.3s;">今彩 539</button>
                    <button id="tab-daily" class="type-btn" style="flex:1; padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #94a3b8; font-size: 13px; cursor: pointer; transition: 0.3s;">加州天天樂</button>
                </div>

                <p id="ai-desc" class="desc-text" style="margin-bottom: 15px;">目前針對 [今彩 539] 執行深度學習趨勢分析。</p>
                
                <div id="ai-output-area" class="analysis-placeholder">
                    <div style="text-align: center; padding: 25px; border: 1px dashed rgba(255,255,255,0.08); border-radius: 16px;">
                        <i class="fas fa-brain" style="font-size: 26px; color: #3b82f6; margin-bottom: 12px; opacity: 0.3;"></i>
                        <div id="ai-placeholder-text" style="font-size: 13px; color: #64748b;">引擎就緒，準備產生推薦號碼</div>
                    </div>
                </div>
                
                <button id="btn-run-ai" class="action-btn primary-btn" style="margin-top: 20px;">
                    <i class="fas fa-play-circle"></i> 產生本期推薦號碼
                </button>
            </div>
        </section>

        <section id="page-history" class="page hidden"><div class="glass-card"><h2>歷史紀錄</h2><div id="history-list"></div></div></section>
        <section id="page-backtest" class="page hidden"><div class="glass-card"><h2>勝率回測</h2><div id="bt-stats-panel"></div><div id="bt-list"></div></div></section>
        <section id="page-fav" class="page hidden"><div class="glass-card"><h2>收藏清單</h2><div id="favorites-list"></div></div></section>
        <section id="page-settings" class="page hidden"><div class="glass-card"><h2>工具箱</h2><button id="btn-reload">手動同步</button></div></section>

    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" data-target="page-home"><i class="fas fa-home"></i><span>首頁</span></div>
        <div class="nav-item" data-target="page-history"><i class="fas fa-history"></i><span>歷史</span></div>
        <div class="nav-item" data-target="page-backtest"><i class="fas fa-chart-line"></i><span>回測</span></div>
        <div class="nav-item" data-target="page-fav"><i class="fas fa-star"></i><span>收藏</span></div>
        <div class="nav-item" data-target="page-settings"><i class="fas fa-tools"></i><span>工具</span></div>
    </nav>

    <div id="toast" class="toast hidden"></div>
    <script src="app.js?v=5.2"></script>
</body>
</html>
