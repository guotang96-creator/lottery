<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彩券 AI 數據分析中心 V11</title>
    <link rel="stylesheet" href="style.css?v=1102">
</head>
<body>
    <header>
        <div class="logo">AI</div>
        <h1>彩券 AI 數據分析中心</h1>
        <div class="subtitle">V11 全能旗艦版 (五合一升級)</div>
    </header>

    <main id="page-home" class="page active">
        
        <section class="card" id="latest-result-card">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #2a2d52; padding-bottom: 10px; margin-bottom: 15px;">
                <h2 style="margin: 0; border: none; padding: 0;">🏆 開獎結果 <span id="latest-title-type" style="color: #2f65ff; font-size: 14px; margin-left: 5px;">今彩 539</span></h2>
                <div style="text-align: right; font-size: 12px; color: #8a8db9;">
                    <span id="latest-issue">連線中...</span><br>
                    <span id="latest-date"></span>
                </div>
            </div>
            <div class="ball-container" id="latest-balls" style="margin-top: 10px;">
                <div style="color: #888; font-size: 14px; text-align: center;">資料同步中...</div>
            </div>
        </section>

        <section class="card">
            <h2>🤖 智能選號建議 (V11 泛用型矩陣)</h2>
            
            <div class="tab-buttons" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
                <button class="primary-btn active" id="btn-539" onclick="switchTab('539')">今彩 539</button>
                <button class="secondary-btn" id="btn-daily" onclick="switchTab('daily')">天天樂</button>
                <button class="secondary-btn" id="btn-lotto" onclick="switchTab('lotto')">大樂透</button>
                <button class="secondary-btn" id="btn-weili" onclick="switchTab('weili')">威力彩</button>
                <button class="secondary-btn" id="btn-marksix" onclick="switchTab('marksix')">六合彩</button>
            </div>

            <div class="predict-result" id="result-box">
                <div style="text-align: center; color: #888; padding: 20px;">資料載入中...</div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active">首頁</button>
        <button class="nav-item">歷史</button>
        <button class="nav-item">回測</button>
        <button class="nav-item">收藏</button>
        <button class="nav-item">設定</button>
    </nav>

    <script src="app2.js?v=1102"></script>
</body>
</html>
